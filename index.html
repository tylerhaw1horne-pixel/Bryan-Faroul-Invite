<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovered Tape // DO NOT WATCH</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100%;
width:100%;
background:#000;
color:#eee;
font-family:"Courier New", monospace;
overflow:hidden;
}

/* BACKGROUND */
canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:0;
}

/* VHS / CRT */
.overlay{
position:fixed;
top:0;left:0;width:100%;height:100%;
pointer-events:none;
}

.scanlines{
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.05) 0px,
rgba(255,255,255,.05) 1px,
transparent 2px,
transparent 4px
);
opacity:.2;
animation:scan 8s linear infinite;
}

.noise{
background-image:radial-gradient(circle,rgba(255,255,255,.7) .7px,transparent 1px);
background-size:4px 4px;
opacity:.05;
animation:noise .15s infinite;
}

.vignette{
background:radial-gradient(circle,transparent 40%,rgba(0,0,0,.6));
}

/* MAIN FRAME */
.frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:900px;
padding:40px;
border:1px solid rgba(255,255,255,.08);
background:rgba(0,0,0,.7);
text-align:center;
box-shadow:0 0 40px rgba(255,0,0,.1);
}

/* TEXT */
.title{
font-size:clamp(30px,6vw,80px);
letter-spacing:.1em;
text-transform:uppercase;
margin-bottom:20px;
}

.subtitle{
opacity:.8;
margin-bottom:20px;
}

.type{
white-space:pre-wrap;
font-size:18px;
min-height:160px;
}

.cursor{
animation:blink 1s infinite;
}

/* BUTTON */
.btn{
margin-top:30px;
padding:12px 20px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
font-size:12px;
letter-spacing:.2em;
background:none;
color:white;
}

/* GLITCH */
.glitch{
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
top:0;left:0;
width:100%;
opacity:.6;
}

.glitch::before{
color:red;
transform:translate(2px,-2px);
}

.glitch::after{
color:cyan;
transform:translate(-2px,2px);
}

/* HIDDEN FIGURE FLASH */
.shadow{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle at center, transparent 20%, rgba(0,0,0,.9));
opacity:0;
z-index:20;
}

/* FLASH */
.flash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#fff;
opacity:0;
z-index:50;
}

/* ANIMATIONS */
@keyframes blink{50%{opacity:0}}
@keyframes scan{0%{transform:translateY(-2%)}100%{transform:translateY(2%)}}
@keyframes noise{0%{transform:translate(0,0)}100%{transform:translate(1%,1%)}}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="overlay scanlines"></div>
<div class="overlay noise"></div>
<div class="overlay vignette"></div>

<div class="shadow" id="shadow"></div>
<div class="flash" id="flash"></div>

<div class="frame" id="frame">

<div class="title glitch" data-text="THIS TAPE WAS NOT MEANT TO BE FOUND">
THIS TAPE WAS NOT MEANT TO BE FOUND
</div>

<div class="type" id="type"></div>

<button class="btn" id="start">PLAY RECORDING</button>

</div>

<script>
/* ================================
   INVITE DATA (EDIT THIS)
================================ */
const INVITE = {
name: "Sam Newman",
lines: [
"They said not to watch this.",
"We found the camera in the woods.",
"There were no footprints leaving.",
"The audio was... wrong.",
"We tried to delete the file.",
"It came back.",
"It always comes back.",
"...",
"Then it said a name.",
"",
"YOUR NAME WAS THERE."
],
final:
"When everything breaks, I know who stands with me.\n\nWill you be my groomsman?"
};

/* ================================
   TYPEWRITER
================================ */
const typeBox = document.getElementById("type");
let i=0, text="";
function typeLine(lines){
text = lines.join("\n");
i=0;

function step(){
let display = text.substring(0,i);
if(Math.random()>.97){
display = display.replace(/./g,c=>Math.random()>.98?"#":c);
}

typeBox.innerHTML = display + '<span class="cursor">|</span>';
i++;

if(i<=text.length){
setTimeout(step, Math.random()*40+30);
}else{
setTimeout(revealName,1000);
}
}
step();
}

/* ================================
   REVEAL NAME GLITCH
================================ */
function revealName(){
typeBox.innerHTML = "LOADING IDENTITY...\n\n" + INVITE.name;

glitchBurst();
setTimeout(finalReveal,2000);
}

/* ================================
   FINAL SCREEN
================================ */
function finalReveal(){
typeBox.innerHTML = INVITE.final;
}

/* ================================
   GLITCH + SHADOW
================================ */
function glitchBurst(){
const shadow = document.getElementById("shadow");
const flash = document.getElementById("flash");

shadow.style.opacity = .9;
flash.style.opacity = .8;

setTimeout(()=>{
shadow.style.opacity = 0;
flash.style.opacity = 0;
},120);
}

/* random shadow flickers */
setInterval(()=>{
if(Math.random()>.93){
glitchBurst();
}
},2000);

/* ================================
   AUDIO (INSANE PART)
================================ */
let ctx;

function startAudio(){
ctx = new (window.AudioContext||window.webkitAudioContext)();

const osc = ctx.createOscillator();
osc.frequency.value = 40;

const gain = ctx.createGain();
gain.gain.value = .05;

osc.connect(gain).connect(ctx.destination);
osc.start();

/* whisper noise */
setInterval(()=>{
const burst = ctx.createOscillator();
burst.type="square";
burst.frequency.value = 800 + Math.random()*600;

const g = ctx.createGain();
g.gain.setValueAtTime(0.0001,ctx.currentTime);
g.gain.linearRampToValueAtTime(.05,ctx.currentTime+.01);
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+.2);

burst.connect(g).connect(ctx.destination);
burst.start();
burst.stop(ctx.currentTime+.2);
},1800);
}

/* ================================
   CANVAS (MOVING DARK SKY)
================================ */
const canvas = document.getElementById("bg");
const c = canvas.getContext("2d");

let w,h;
function resize(){
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
}
resize();
window.onresize=resize;

let stars = Array.from({length:120},()=>({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*1.5
}));

function draw(){
c.fillStyle="#000";
c.fillRect(0,0,w,h);

for(let s of stars){
c.fillStyle="rgba(255,255,255,.5)";
c.fillRect(s.x,s.y,s.r,s.r);
}

requestAnimationFrame(draw);
}
draw();

/* ================================
   START BUTTON
================================ */
document.getElementById("start").onclick=()=>{
startAudio();
typeLine(INVITE.lines);
};
</script>

</body>
</html>
